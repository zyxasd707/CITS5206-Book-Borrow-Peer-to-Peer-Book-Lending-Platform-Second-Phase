name: bookborrow

services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: BookBorrow
      MYSQL_USER: myuser
      MYSQL_PASSWORD: "123456"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mynetwork

  backend:
    image: fastapi:latest
    build: ./fastapi              # Path to backend Dockerfile
    container_name: fastapi-backend
    ports:
      - "8000:8000"          # Host:Container
    env_file:
      - ./.env
    depends_on:
      - db
    networks:
      - mynetwork

  frontend:
    image: frontendnext:latest
    build:
      context: ./frontendNext             # Path to frontend Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_STRIPE_PK: ${NEXT_PUBLIC_STRIPE_PK}
        NEXT_PUBLIC_STRIPE_TEST_DESTINATION_ACCOUNT_ID: ${NEXT_PUBLIC_STRIPE_TEST_DESTINATION_ACCOUNT_ID}
    container_name: next-frontend
    ports:
      - "3000:3000"          # Host:Container
    env_file:
      - ./.env 
    depends_on:
      - backend                   # Ensure backend starts first
    networks:
      - mynetwork

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/block-probes.conf:/etc/nginx/conf.d/block-probes.conf:ro
      - ./nginx/logs:/var/log/nginx
      # TLS setting
      - ./nginx/certbot/www:/var/www/certbot        
      - ./nginx/letsencrypt:/etc/letsencrypt          
    depends_on:
      - frontend
      - backend
    networks:
      - mynetwork


volumes:
  mysql_data:
    name: bookborrow_mysql_data

networks:
  mynetwork:
    driver: bridge
