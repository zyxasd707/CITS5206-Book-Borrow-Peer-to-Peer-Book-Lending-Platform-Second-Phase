services:
  db:             # Local MySQL database for development only;
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: BookHive
      MYSQL_USER: myuser
      MYSQL_PASSWORD: "123456"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mynetwork
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: fastapi:latest
    build: ./fastapi              # Path to backend Dockerfile
    container_name: fastapi-backend
    ports: 
      - "8000:8000"       # Exposed for direct browser access to backend API
    env_file:
      - ./.env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./fastapi:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy    # Wait for MySQL to be ready before starting backend
    networks:
      - mynetwork

  frontend:
    image: frontendnext:latest
    build: ./frontendNext
    container_name: next-frontend
    env_file:
      - ./.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontendNext:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mynetwork

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge

volumes:
  mysql_data:
  frontend_node_modules:
  frontend_next_cache:
